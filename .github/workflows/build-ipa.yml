name: Build IPA for TrollStore

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Check LFS files
        run: |
          echo "=== Libraries 目录 ==="
          ls -la gamewinwinwinwin/Libraries/ || echo "目录不存在"
          echo ""
          echo "=== libil2cpp.a 大小 ==="
          ls -lh gamewinwinwinwin/Libraries/libil2cpp.a || echo "文件不存在"
          echo ""
          echo "=== Git LFS 列表 ==="
          git lfs ls-files | head -30
          echo ""
          echo "=== 检查是否是 LFS 指针 ==="
          head -5 gamewinwinwinwin/Libraries/libil2cpp.a 2>/dev/null || echo "无法读取"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Check libil2cpp symbols
        run: |
          echo "=== libil2cpp.a 文件信息 ==="
          ls -lh gamewinwinwinwin/Libraries/libil2cpp.a
          file gamewinwinwinwin/Libraries/libil2cpp.a
          
          echo ""
          echo "=== 检查 WriteBarrier 符号 ==="
          nm gamewinwinwinwin/Libraries/libil2cpp.a 2>/dev/null | grep -i "WriteBarrier" | head -20
          if [ $? -ne 0 ]; then
            echo "没找到 WriteBarrier 相关符号"
          fi
          
          echo ""
          echo "=== 检查 Il2CppCodeGen 符号 ==="
          nm gamewinwinwinwin/Libraries/libil2cpp.a 2>/dev/null | grep -i "Il2CppCodeGen" | head -20
          if [ $? -ne 0 ]; then
            echo "没找到 Il2CppCodeGen 相关符号"
          fi
          
          echo ""
          echo "=== 检查架构 ==="
          lipo -info gamewinwinwinwin/Libraries/libil2cpp.a 2>/dev/null || echo "无法检查架构"

      - name: Build .app (Skip Signing)
        run: |
          cd gamewinwinwinwin
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            build

      - name: Find .app
        run: |
          echo "=== 查找 .app 文件 ==="
          find build/DerivedData -name "*.app" -type d | head -10
          APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo ""
            echo "找到: $APP_PATH"
            ls -la "$APP_PATH/" | head -15
          fi

      - name: Package IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
          APP_NAME=$(basename "$APP_PATH")
          echo "App 名称: $APP_NAME"
          rm -rf build/ipa-tmp
          mkdir -p build/ipa-tmp/Payload
          cp -R "$APP_PATH" build/ipa-tmp/Payload/
          find "build/ipa-tmp/Payload/$APP_NAME" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "build/ipa-tmp/Payload/$APP_NAME" -name "embedded.mobileprovision" -delete 2>/dev/null || true
          cd build/ipa-tmp
          zip -qr ../Unity-iPhone-TrollStore.ipa Payload/
          cd ../..
          echo ""
          echo "=== IPA 验证 ==="
          ls -lh build/*.ipa
          echo ""
          echo "=== IPA 内部结构 ==="
          unzip -l build/Unity-iPhone-TrollStore.ipa | head -20

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Unity-iPhone-TrollStore-IPA
          path: build/*.ipa
          retention-days: 90

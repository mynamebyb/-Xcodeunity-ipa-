name: Build IPA for TrollStore

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build .app (Skip Signing)
        run: |
          cd gamewinwinwinwin
          LIB_PATH="$(pwd)/Libraries"
          
          # 读取原有的 OTHER_LDFLAGS
          BUILD_SETTINGS=$(xcodebuild -project Unity-iPhone.xcodeproj -scheme Unity-iPhone -configuration Release -showBuildSettings 2>/dev/null)
          ORIGINAL_LDFLAGS=$(echo "$BUILD_SETTINGS" | grep -m1 "OTHER_LDFLAGS" | sed 's/^[[:space:]]*OTHER_LDFLAGS = //')
          echo "原有参数: $ORIGINAL_LDFLAGS"
          
          # 追加所有需要的框架和库
          NEW_LDFLAGS="$ORIGINAL_LDFLAGS \
            -force_load $LIB_PATH/libil2cpp.a \
            -force_load $LIB_PATH/libiPhone-lib.a \
            -force_load $LIB_PATH/baselib.a \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            -framework Metal \
            -framework MetalKit \
            -framework OpenGLES \
            -framework AudioToolbox \
            -framework AVFoundation \
            -framework GameKit \
            -framework StoreKit \
            -framework SystemConfiguration \
            -framework CoreTelephony \
            -framework CoreLocation \
            -framework CFNetwork \
            -framework Security \
            -framework CoreText \
            -framework CoreMedia \
            -framework CoreVideo \
            -framework GameController \
            -framework AVKit \
            -framework MediaToolbox \
            -framework OpenAL \
            -framework MobileCoreServices \
            -framework WebKit \
            -lz \
            -liconv \
            -lc++ \
            -lsqlite3"
          
          echo "新参数: $NEW_LDFLAGS"
          
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            LIBRARY_SEARCH_PATHS="$LIB_PATH $(inherited)" \
            OTHER_LDFLAGS="$NEW_LDFLAGS" \
            build

      - name: Find .app
        run: |
          echo "=== 查找 .app 文件 ==="
          find build/DerivedData -name "*.app" -type d | head -10
          APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo ""
            echo "找到: $APP_PATH"
            ls -la "$APP_PATH/" | head -15
          fi

      - name: Package IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
          APP_NAME=$(basename "$APP_PATH")
          echo "App 名称: $APP_NAME"
          rm -rf build/ipa-tmp
          mkdir -p build/ipa-tmp/Payload
          cp -R "$APP_PATH" build/ipa-tmp/Payload/
          find "build/ipa-tmp/Payload/$APP_NAME" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "build/ipa-tmp/Payload/$APP_NAME" -name "embedded.mobileprovision" -delete 2>/dev/null || true
          find "build/ipa-tmp/Payload/$APP_NAME" -name "CodeResources" -delete 2>/dev/null || true
          cd build/ipa-tmp
          zip -qr ../Unity-iPhone-TrollStore.ipa Payload/
          cd ../..
          echo ""
          echo "=== IPA 验证 ==="
          ls -lh build/*.ipa
          echo ""
          echo "=== IPA 内部结构 ==="
          unzip -l build/Unity-iPhone-TrollStore.ipa | head -20

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Unity-iPhone-TrollStore-IPA
          path: build/*.ipa
          retention-days: 90

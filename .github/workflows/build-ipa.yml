name: Build IPA for TrollStore

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 修复 UnityFramework 自链接问题
        run: |
          cd gamewinwinwinwin
          
          # 从 UnityFramework target 的 Frameworks build phase 中移除 UnityFramework 自己的引用
          # 找到 UnityFramework 的 target ID，然后从它的 Frameworks phase 里去掉
          
          # 先备份
          cp Unity-iPhone.xcodeproj/project.pbxproj Unity-iPhone.xcodeproj/project.pbxproj.bak
          
          # 方法：用 sed 去掉所有 Frameworks build phase 中的 UnityFramework 引用
          # 查找包含 "UnityFramework" 且在 frameworks 段的行，删掉对应的 fileRef
          
          # 先找到 UnityFramework.framework 的 fileRef ID
          UF_ID=$(grep -o '[A-F0-9]\{24\}.*UnityFramework\.framework' Unity-iPhone.xcodeproj/project.pbxproj | head -1 | grep -o '^[A-F0-9]\{24\}')
          echo "UnityFramework fileRef ID: $UF_ID"
          
          if [ -n "$UF_ID" ]; then
            # 从 PBXFrameworksBuildPhase 中移除这个 ID 的引用
            # 格式通常是: XXXXXXXX /* UnityFramework.framework in Frameworks */,
            sed -i '' "/$UF_ID.*UnityFramework\.framework in Frameworks/d" Unity-iPhone.xcodeproj/project.pbxproj
            echo "已从 Frameworks build phase 中移除 UnityFramework 自引用"
          else
            echo "没找到 UnityFramework 的 fileRef，可能已经是对的"
          fi
          
          # 验证一下
          echo ""
          echo "=== 验证：Frameworks phase 中还有没有 UnityFramework ==="
          grep -c "UnityFramework.framework in Frameworks" Unity-iPhone.xcodeproj/project.pbxproj || echo "0 个（正确）"

      - name: Step 1 - Build GameAssembly
        run: |
          cd gamewinwinwinwin
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -target GameAssembly \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            build

      - name: Step 2 - Build UnityFramework
        run: |
          cd gamewinwinwinwin
          LIB_PATH="$(pwd)/Libraries"
          
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -target UnityFramework \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            LIBRARY_SEARCH_PATHS="$LIB_PATH" \
            OTHER_LDFLAGS="\
              -force_load $LIB_PATH/libil2cpp.a \
              -force_load $LIB_PATH/libiPhone-lib.a \
              -force_load $LIB_PATH/baselib.a \
              -lz \
              -lsqlite3 \
              -liconv" \
            build

      - name: Step 3 - Build main app
        run: |
          cd gamewinwinwinwin
          BUILD_PRODUCTS_PATH="$(pwd)/build/Release-iphoneos"
          
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -target Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            FRAMEWORK_SEARCH_PATHS="$BUILD_PRODUCTS_PATH" \
            OTHER_LDFLAGS="-framework UnityFramework" \
            build

      - name: Find .app
        run: |
          echo "=== 查找 .app 文件 ==="
          APP_PATH="$(pwd)/gamewinwinwinwin/build/Release-iphoneos/sotime.app"
          if [ -d "$APP_PATH" ]; then
            echo "找到: $APP_PATH"
            ls -la "$APP_PATH/" | head -15
          else
            echo "没找到，搜索一下..."
            find ~/Library/Developer/Xcode/DerivedData -name "sotime.app" -type d 2>/dev/null | head -5
          fi

      - name: Package IPA
        run: |
          APP_PATH="$(pwd)/gamewinwinwinwin/build/Release-iphoneos/sotime.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "sotime.app" -type d 2>/dev/null | head -1)
          fi
          
          APP_NAME=$(basename "$APP_PATH")
          echo "App 名称: $APP_NAME"
          echo "App 路径: $APP_PATH"
          
          rm -rf build/ipa-tmp
          mkdir -p build/ipa-tmp/Payload
          cp -R "$APP_PATH" build/ipa-tmp/Payload/
          
          find "build/ipa-tmp/Payload/$APP_NAME" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "build/ipa-tmp/Payload/$APP_NAME" -name "embedded.mobileprovision" -delete 2>/dev/null || true
          find "build/ipa-tmp/Payload/$APP_NAME" -name "CodeResources" -delete 2>/dev/null || true
          
          cd build/ipa-tmp
          zip -qr ../Unity-iPhone-TrollStore.ipa Payload/
          cd ../..
          
          echo ""
          echo "=== IPA 验证 ==="
          ls -lh build/*.ipa
          echo ""
          echo "=== IPA 内部结构 ==="
          unzip -l build/Unity-iPhone-TrollStore.ipa | head -20

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Unity-iPhone-TrollStore-IPA
          path: build/*.ipa
          retention-days: 90

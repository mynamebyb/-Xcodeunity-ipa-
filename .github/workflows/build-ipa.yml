name: Build IPA for TrollStore

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Step 1 - Build GameAssembly
        run: |
          cd gamewinwinwinwin
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -target GameAssembly \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            build

      - name: Step 2 - Build UnityFramework
        run: |
          cd gamewinwinwinwin
          LIB_PATH="$(pwd)/Libraries"
          BUILD_DIR="$(pwd)/build"
          
          # 构建前先删掉 EagerLinkingTBDs 里的自己，防止自链接
          rm -rf "$BUILD_DIR/EagerLinkingTBDs/Release-iphoneos/UnityFramework.framework"
          
          # 完全手动配置 OTHER_LDFLAGS，不继承，确保没有 -framework UnityFramework
          # 只加 force_load 和基础系统库，其他框架用项目原有的
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -target UnityFramework \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            LIBRARY_SEARCH_PATHS="$LIB_PATH" \
            OTHER_LDFLAGS="\
              -force_load $LIB_PATH/libil2cpp.a \
              -force_load $LIB_PATH/libiPhone-lib.a \
              -force_load $LIB_PATH/baselib.a \
              -lz \
              -lsqlite3 \
              -liconv" \
            build

      - name: Step 3 - Build main app
        run: |
          cd gamewinwinwinwin
          BUILD_PRODUCTS_PATH="$(pwd)/build/Release-iphoneos"
          
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -target Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            FRAMEWORK_SEARCH_PATHS="$BUILD_PRODUCTS_PATH" \
            OTHER_LDFLAGS="-framework UnityFramework" \
            build

      - name: Find .app
        run: |
          echo "=== 查找 .app 文件 ==="
          APP_PATH="$(pwd)/gamewinwinwinwin/build/Release-iphoneos/sotime.app"
          if [ -d "$APP_PATH" ]; then
            echo "找到: $APP_PATH"
            ls -la "$APP_PATH/" | head -15
          else
            echo "没找到，搜索一下..."
            find ~/Library/Developer/Xcode/DerivedData -name "sotime.app" -type d 2>/dev/null | head -5
          fi

      - name: Package IPA
        run: |
          APP_PATH="$(pwd)/gamewinwinwinwin/build/Release-iphoneos/sotime.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "sotime.app" -type d 2>/dev/null | head -1)
          fi
          
          APP_NAME=$(basename "$APP_PATH")
          echo "App 名称: $APP_NAME"
          echo "App 路径: $APP_PATH"
          
          rm -rf build/ipa-tmp
          mkdir -p build/ipa-tmp/Payload
          cp -R "$APP_PATH" build/ipa-tmp/Payload/
          
          # 清理签名相关
          find "build/ipa-tmp/Payload/$APP_NAME" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "build/ipa-tmp/Payload/$APP_NAME" -name "embedded.mobileprovision" -delete 2>/dev/null || true
          find "build/ipa-tmp/Payload/$APP_NAME" -name "CodeResources" -delete 2>/dev/null || true
          
          cd build/ipa-tmp
          zip -qr ../Unity-iPhone-TrollStore.ipa Payload/
          cd ../..
          
          echo ""
          echo "=== IPA 验证 ==="
          ls -lh build/*.ipa
          echo ""
          echo "=== IPA 内部结构 ==="
          unzip -l build/Unity-iPhone-TrollStore.ipa | head -20

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Unity-iPhone-TrollStore-IPA
          path: build/*.ipa
          retention-days: 90

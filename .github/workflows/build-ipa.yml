name: Build IPA for TrollStore

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    
    steps:
    - name: Checkout (with Git LFS)
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: recursive
        
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: List all schemes (诊断用)
      run: |
        cd gamewinwinwinwin
        echo "=== 所有可用的 Scheme ==="
        xcodebuild -list -project Unity-iPhone.xcodeproj
        
        echo ""
        echo "=== 所有 Target ==="
        xcodebuild -list -project Unity-iPhone.xcodeproj | grep -A 20 "Targets:"
        
        echo ""
        echo "=== Scheme 文件检查 ==="
        ls -la Unity-iPhone.xcodeproj/
        ls -la Unity-iPhone.xcodeproj/xcshareddata/ 2>/dev/null || echo "没有 xcshareddata"
        ls -la Unity-iPhone.xcodeproj/xcuserdata/ 2>/dev/null || echo "没有 xcuserdata"
        
    - name: Build .app (Skip Signing)
      run: |
        cd gamewinwinwinwin
        
        # 先尝试用 -target 方式构建
        xcodebuild \
          -project Unity-iPhone.xcodeproj \
          -target Unity-iPhone \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ../build/DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGN_ENTITLEMENTS="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          PROVISIONING_PROFILE="" \
          DEVELOPMENT_TEAM="" \
          ONLY_ACTIVE_ARCH=NO \
          ENABLE_BITCODE=NO \
          build
        
    - name: Find .app and verify
      run: |
        echo "=== 查找 .app 文件 ==="
        find build/DerivedData -name "*.app" -type d | head -10
        
    - name: Package IPA (Correct Structure)
      run: |
        APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
        APP_NAME=$(basename "$APP_PATH")
        
        echo "找到的 .app: $APP_PATH"
        echo "App 名称: $APP_NAME"
        
        rm -rf build/ipa-tmp
        mkdir -p build/ipa-tmp/Payload
        
        cp -R "$APP_PATH" build/ipa-tmp/Payload/
        
        # 移除签名相关文件
        find "build/ipa-tmp/Payload/$APP_NAME" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
        find "build/ipa-tmp/Payload/$APP_NAME" -name "embedded.mobileprovision" -delete 2>/dev/null || true
        
        # 验证结构
        echo ""
        echo "=== IPA 内部文件列表 ==="
        cd build/ipa-tmp
        zip -qr ../Unity-iPhone-TrollStore.ipa Payload/
        cd ../..
        
        unzip -l build/Unity-iPhone-TrollStore.ipa | head -20
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Unity-iPhone-TrollStore-IPA
        path: build/*.ipa
        retention-days: 90
